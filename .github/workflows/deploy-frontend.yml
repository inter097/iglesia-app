name: Deploy Frontend to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'backend/**'
      - '.github/**'
      - '*.md'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".,!backend,!.github,!*.md"
          target: "/opt/iglesia-frontend/"

      - name: Build, restart and verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/iglesia-frontend
            docker compose up -d --build --force-recreate
            sleep 10
            docker inspect iglesia-frontend --format='{{.State.Status}}' | grep -q running || (echo "Container not running" && exit 1)
            docker exec iglesia-frontend wget -qO- http://localhost/ | grep -q 'Canciones AFC' || (echo "Health check failed" && exit 1)
